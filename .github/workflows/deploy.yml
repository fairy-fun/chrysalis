name: Deploy to pecherie

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate before deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate required paths and files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            ".github/workflows/deploy.yml"
            "private/framework/contracts/repo_contract.php"
            "private/framework/contracts/chrysalis_hydration_prompt.md"
            "private/framework/contracts/repo_visibility.php"
            "private/framework/contracts/framework_ingress_policy.php"
            "private/framework/ci/validate_repo_visibility.php"
            "private/framework/ci/validate_framework_ingress.php"
            "public_html/pecherie/chill-api/index.php"
            "public_html/pecherie/chill-api/repo/list_repo.php"
            "public_html/pecherie/chill-api/repo/get_repo_file.php"
          )

          required_dirs=(
            "private/framework/contracts"
            "private/framework/ci"
            "public_html/pecherie/chill-api/repo"
          )

          echo "Checking required files..."
          for path in "${required_files[@]}"; do
            [[ -f "$path" ]] || { echo "ERROR: Missing required file: $path"; exit 1; }
            [[ -r "$path" ]] || { echo "ERROR: Required file is not readable: $path"; exit 1; }
            echo "OK: $path"
          done

          echo "Checking required directories..."
          for path in "${required_dirs[@]}"; do
            [[ -d "$path" ]] || { echo "ERROR: Missing required directory: $path"; exit 1; }
            [[ -r "$path" ]] || { echo "ERROR: Required directory is not readable: $path"; exit 1; }
            echo "OK: $path"
          done

      - name: Lint PHP in public_html/pecherie
        shell: bash
        run: |
          set -euo pipefail
          find public_html/pecherie -type f -name "*.php" -print0 | while IFS= read -r -d '' file; do
            echo "Linting $file"
            php -l "$file"
          done

      - name: Lint PHP in private
        shell: bash
        run: |
          set -euo pipefail
          find private -type f -name "*.php" -print0 | while IFS= read -r -d '' file; do
            echo "Linting $file"
            php -l "$file"
          done

      - name: Validate repo visibility contract
        shell: bash
        run: |
          set -euo pipefail
          php private/framework/ci/validate_repo_visibility.php

      - name: Validate framework ingress policy
        shell: bash
        run: |
          set -euo pipefail
          php private/framework/ci/validate_framework_ingress.php

      - name: Run repo API behaviour tests
        shell: bash
        run: |
          set -euo pipefail
          php private/framework/ci/run_repo_api_behavior_tests.php

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Start ssh-agent and add deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PECHERIE_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 108.174.195.142 >> ~/.ssh/known_hosts

      - name: Sync public files
        run: |
          rsync -rlvtz --delete -e ssh \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude '*.bak' \
            --exclude 'error_log' \
            --exclude '.DS_Store' \
            --exclude '*.env' \
            --exclude 'chrysalis-slack.env' \
            --exclude 'pecherie_config.php' \
            ./public_html/pecherie/ \
            sxnzlfun@108.174.195.142:/home/sxnzlfun/public_html/pecherie/

      - name: Sync private files
        run: |
          rsync -rlvtz --delete -e ssh \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude '*.bak' \
            --exclude 'error_log' \
            --exclude '.DS_Store' \
            --exclude '*.env' \
            --exclude 'chrysalis-slack.env' \
            --exclude 'pecherie_config.php' \
            ./private/ \
            sxnzlfun@108.174.195.142:/home/sxnzlfun/private/
