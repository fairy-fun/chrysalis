name: Deploy to pecherie

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate before deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate required paths and files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            ".github/workflows/deploy.yml"
            "private/framework/contracts/repo_contract.php"
            "private/framework/contracts/chrysalis_hydration_prompt.md"
            "private/framework/contracts/repo_visibility.php"
            "private/framework/contracts/framework_ingress_policy.php"
            "private/framework/ci/validate_repo_visibility.php"
            "private/framework/ci/validate_framework_ingress.php"
            "private/framework/ci/validate_repo_api_registration.php"
            "private/framework/ci/write_ci_config.php"
            "private/framework/ci/seed_ci_data.php"
            "private/framework/ci/run_repo_api_behavior_tests.php"
            "private/framework/ci/validate_classval_semantic_canonicalisation.php"
            "private/framework/classvals/semantic_canonical_rules.php"
            "private/framework/classvals/semantic_canonicalisation.php"
            "public_html/pecherie/chill-api/index.php"
            "public_html/pecherie/chill-api/repo/list_repo.php"
            "public_html/pecherie/chill-api/repo/get_repo_file.php"
            "public_html/pecherie/chill-api/classvals/enforce_semantic_canonicalisation.php"
          )

          required_dirs=(
            "private/framework/contracts"
            "private/framework/ci"
            "private/framework/classvals"
            "public_html/pecherie/chill-api/repo"
            "public_html/pecherie/chill-api/classvals"
          )

          echo "Checking required files..."
          for path in "${required_files[@]}"; do
            [[ -f "$path" ]] || { echo "ERROR: Missing required file: $path"; exit 1; }
            [[ -r "$path" ]] || { echo "ERROR: Required file is not readable: $path"; exit 1; }
            echo "OK: $path"
          done

          echo "Checking required directories..."
          for path in "${required_dirs[@]}"; do
            [[ -d "$path" ]] || { echo "ERROR: Missing required directory: $path"; exit 1; }
            [[ -r "$path" ]] || { echo "ERROR: Required directory is not readable: $path"; exit 1; }
            echo "OK: $path"
          done

      - name: Lint PHP in public_html/pecherie
        shell: bash
        run: |
          set -euo pipefail
          find public_html/pecherie -type f -name "*.php" -print0 | while IFS= read -r -d '' file; do
            echo "Linting $file"
            php -l "$file"
          done

      - name: Lint PHP in private
        shell: bash
        run: |
          set -euo pipefail
          find private -type f -name "*.php" -print0 | while IFS= read -r -d '' file; do
            echo "Linting $file"
            php -l "$file"
          done

      - name: Validate repo visibility contract
        shell: bash
        run: |
          set -euo pipefail
          php private/framework/ci/validate_repo_visibility.php

      - name: Validate framework ingress policy
        shell: bash
        run: |
          set -euo pipefail
          php private/framework/ci/validate_framework_ingress.php

      - name: Validate API registration invariant
        shell: bash
        run: |
          set -euo pipefail
          php private/framework/ci/validate_repo_api_registration.php

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Start ssh-agent and add deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PECHERIE_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 108.174.195.142 >> ~/.ssh/known_hosts

      - name: Sync public files
        run: |
          rsync -rlvtz --delete -e ssh \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude '*.bak' \
            --exclude 'error_log' \
            --exclude '.DS_Store' \
            --exclude '*.env' \
            --exclude 'chrysalis-slack.env' \
            --exclude 'pecherie_config.php' \
            --exclude 'pecherie_ci_config.php' \
            ./public_html/pecherie/ \
            sxnzlfun@108.174.195.142:/home/sxnzlfun/public_html/pecherie/

      - name: Sync private files
        run: |
          rsync -rlvtz --delete -e ssh \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude '*.bak' \
            --exclude 'error_log' \
            --exclude '.DS_Store' \
            --exclude '*.env' \
            --exclude 'chrysalis-slack.env' \
            --exclude 'pecherie_config.php' \
            --exclude 'pecherie_ci_config.php' \
            ./private/ \
            sxnzlfun@108.174.195.142:/home/sxnzlfun/private/

      - name: Run server-side behaviour checks
        env:
          PECHERIE_DB_HOST: ${{ secrets.PECHERIE_DB_HOST }}
          PECHERIE_DB_PORT: ${{ secrets.PECHERIE_DB_PORT }}
          PECHERIE_DB_NAME: ${{ secrets.PECHERIE_DB_NAME }}
          PECHERIE_DB_USER: ${{ secrets.PECHERIE_CI_DB_USER }}
          PECHERIE_DB_PASS: ${{ secrets.PECHERIE_CI_DB_PASS }}
          ANTHEAPECHE_API_URL: ${{ secrets.ANTHEAPECHE_API_URL }}
          ANTHEAPECHE_API_KEY: ${{ secrets.ANTHEAPECHE_API_KEY }}
        run: |
          ssh sxnzlfun@108.174.195.142 "
            set -euo pipefail
            trap 'rm -f /home/sxnzlfun/pecherie_ci_config.php' EXIT

            export PECHERIE_DB_HOST='${PECHERIE_DB_HOST}'
            export PECHERIE_DB_PORT='${PECHERIE_DB_PORT}'
            export PECHERIE_DB_NAME='${PECHERIE_DB_NAME}'
            export PECHERIE_DB_USER='${PECHERIE_DB_USER}'
            export PECHERIE_DB_PASS='${PECHERIE_DB_PASS}'
            export ANTHEAPECHE_API_URL='${ANTHEAPECHE_API_URL}'
            export ANTHEAPECHE_API_KEY='${ANTHEAPECHE_API_KEY}'

            cd /home/sxnzlfun

            echo '==> Writing CI config'
            php private/framework/ci/write_ci_config.php

            echo '==> Seeding test data'
            php private/framework/ci/seed_ci_data.php
          
            echo '==> Mirroring profile types as entities'
            php private/framework/ci/mirror_profile_types_as_entities.php

            echo '==> Mirroring status as entities'
            php private/framework/ci/mirror_status_as_entities.php
          
            echo '==> Mirroring figures as entities'
            php private/framework/ci/mirror_figures_as_entities.php
          
            echo '==> Inspecting deprecated event/theme classvals'
            php private/framework/ci/debug_event_theme_rows.php
          
            echo '==> Validating classval semantic canonicalisation'
            php -d display_errors=1 private/framework/ci/validate_classval_semantic_canonicalisation.php

            echo '==> Running all audits'
            php private/framework/ci/run_all_audits.php
            
            echo '==> Running behaviour tests'
            php private/framework/ci/run_repo_api_behavior_tests.php
          
            echo '==> Testing character expression resolver'
            php private/framework/expression/test_resolver.php CI_CHAR_EXPR_1 1
          
            echo '==> Testing character expression API (smoke)'

              cat > /tmp/test_expression_api_smoke.sh <<'EOF'
              #!/usr/bin/env bash
              set -euo pipefail

              response="$(
              curl -sS -X POST "$ANTHEAPECHE_API_URL" \
            -H 'Content-Type: application/json' \
            -H "X-API-Key: $ANTHEAPECHE_API_KEY" \
              -d '{
            "operation": "resolveCharacterExpressionOutput",
            "character_id": "CI_CHAR_EXPR_1",
            "domain_id": 1
            }'
            )"

            echo "$response"

            php -r '
              $data = json_decode(stream_get_contents(STDIN), true);

              if (!is_array($data)) {
            fwrite(STDERR, "FAIL: invalid JSON\n");
              exit(1);
            }

              if (($data["status"] ?? null) !== "ok") {
            fwrite(STDERR, "FAIL: status not ok\n");
              exit(1);
            }

              if (($data["character_id"] ?? null) !== "CI_CHAR_EXPR_1") {
            fwrite(STDERR, "FAIL: character_id mismatch\n");
              exit(1);
            }

              if (($data["domain_id"] ?? null) !== "1") {
            fwrite(STDERR, "FAIL: domain_id not string-cast\n");
              exit(1);
            }

              if (!isset($data["output"]) || !is_array($data["output"])) {
            fwrite(STDERR, "FAIL: output missing\n");
              exit(1);
            }

            echo "OK: API smoke test passed\n";
              ' <<< "$response"
              EOF

              chmod +x /tmp/test_expression_api_smoke.sh
              /tmp/test_expression_api_smoke.sh 
          "